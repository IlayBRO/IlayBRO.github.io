<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השירים שאהבתי - Potteerr</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 40px; text-shadow: 0 0 10px #ff1493; }

        /* גריד השירים - דומה לצילום המסך ששלחת */
        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .song-card {
            background-color: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.4);
            border-color: #ff1493;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-bottom: 2px solid #ff1493;
        }

        .song-info { padding: 15px; }
        .song-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; display: block; }
        .song-artist { color: #94a3b8; font-size: 14px; }

        .back-btn {
            margin-top: 50px;
            padding: 12px 25px;
            background-color: #1e293b;
            border: 1px solid #ff1493;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover { background-color: #ff1493; box-shadow: 0 0 15px #ff1493; }
    </style>
</head>
<body>

    <h1>🎵 השירים שאהבתי</h1>

    <div class="songs-grid">
        <a href="https://youtu.be/IPZKwAh7omQ" target="_blank" class="song-card">
            <img src="https://img.youtube.com/vi/IPZKwAh7omQ/maxresdefault.jpg" class="thumbnail">
            <div class="song-info">
                <span class="song-title">שליח פיצה</span>
                <span class="song-artist">Delivery Crew</span>
            </div>
        </a>

        <a href="https://youtu.be/Ld4gUCnsZ4I" target="_blank" class="song-card">
            <img src="https://img.youtube.com/vi/Ld4gUCnsZ4I/maxresdefault.jpg" class="thumbnail">
            <div class="song-info">
                <span class="song-title">רק אני</span>
                <span class="song-artist">עומר אדם</span>
            </div>
        </a>

        <a href="https://youtu.be/whvYpDdkeOQ" target="_blank" class="song-card">
            <img src="https://img.youtube.com/vi/whvYpDdkeOQ/maxresdefault.jpg" class="thumbnail">
            <div class="song-info">
                <span class="song-title">תרקדי</span>
                <span class="song-artist">אושר כהן</span>
            </div>
        </a>

        <a href="https://youtu.be/P7KZkYd-8Ng" target="_blank" class="song-card">
            <img src="https://img.youtube.com/vi/P7KZkYd-8Ng/maxresdefault.jpg" class="thumbnail">
            <div class="song-info">
                <span class="song-title">אהבה חולה</span>
                <span class="song-artist">אושר כהן</span>
            </div>
        </a>

        <a href="https://youtu.be/COLsRUrV6Eo" target="_blank" class="song-card">
            <img src="https://img.youtube.com/vi/COLsRUrV6Eo/maxresdefault.jpg" class="thumbnail">
            <div class="song-info">
                <span class="song-title">Never Gonna Give You Up (כמובן שזה לטרול...)</span>
                <span class="song-artist">Rick Astley</span>
            </div>
        </a>
    </div>

    <a href="index.html" class="back-btn">🏠 חזרה לדף הראשי</a>

</body>
</html>
