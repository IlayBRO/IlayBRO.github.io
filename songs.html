<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השירים שאהבתי - Potteerr</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 40px; text-shadow: 0 0 10px #ff1493; }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .song-card {
            background-color: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .song-card:hover {
            transform: translateY(-5px);
            border-color: #ff1493;
        }

        /* נגן יוטיוב מובנה */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* יחס 16:9 */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .song-info {
            padding: 20px;
            text-align: right;
        }

        .song-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #f8fafc;
            display: block;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .back-btn {
            margin-top: 50px;
            padding: 12px 30px;
            background-color: #1e293b;
            border: 1px solid #ff1493;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #ff1493;
            box-shadow: 0 0 20px #ff1493;
        }
    </style>
</head>
<body>

    <h1>🎵 השירים שאהבתי</h1>

    <div class="songs-grid">
        
        <div class="song-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/IPZKwAh7omQ" allowfullscreen></iframe>
            </div>
            <div class="song-info">
                <span class="song-title">עומר אדם - פלאזה אתנה</span>
                <span class="song-artist">עומר אדם - Omer Adam</span>
            </div>
        </div>

        <div class="song-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Ld4gUCnsZ4I" allowfullscreen></iframe>
            </div>
            <div class="song-info">
                <span class="song-title">עומר אדם - רק אני</span>
                <span class="song-artist">עומר אדם - Omer Adam</span>
            </div>
        </div>

        <div class="song-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/whvYpDdkeOQ" allowfullscreen></iframe>
            </div>
            <div class="song-info">
                <span class="song-title">אושר כהן - תרקדי</span>
                <span class="song-artist">אושר כהן - Osher Cohen</span>
            </div>
        </div>

        <div class="song-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/P7KZkYd-8Ng" allowfullscreen></iframe>
            </div>
            <div class="song-info">
                <span class="song-title">GHOSTEMANE</span>
                <span class="song-artist">Squeeze - Raper</span>
            </div>
        </div>

        <div class="song-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/COLsRUrV6Eo" allowfullscreen></iframe>
            </div>
            <div class="song-info">
                <span class="song-title">אניתום - איזה טוב אני נראה (כמובן שזה לטרול...)</span>
                <span class="song-artist">מיסטר בשר נא</span>
            </div>
        </div>

    </div>

    <a href="index.html" class="back-btn">🏠 חזרה לדף הראשי</a>

</body>
</html>
