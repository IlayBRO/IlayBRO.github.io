<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr | Official Links</title>
    <style>
        /* הגדרות בסיסיות */
        body {
            background-color: #0b1120; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- אפקט כניסה חלק --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * {
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .container .profile-pic { animation-delay: 0.1s; }
        .container h2 { animation-delay: 0.2s; }
        .container p { animation-delay: 0.3s; }
        .container .link-btn:nth-of-type(1) { animation-delay: 0.4s; }
        .container .link-btn:nth-of-type(2) { animation-delay: 0.5s; }
        .container .link-btn:nth-of-type(3) { animation-delay: 0.6s; }
        .container .link-btn:nth-of-type(4) { animation-delay: 0.7s; }

        /* --- אורות דקורטיביים בצדדים --- */
        .glow-orb {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
            animation: fadeUp 2s ease forwards;
        }
        .orb-left { 
            background: radial-gradient(circle, #0dcaf0, transparent 70%); 
            bottom: -200px; 
            left: -300px; 
        }
        .orb-right { 
            background: radial-gradient(circle, #20c997, transparent 70%); 
            bottom: -200px; 
            right: -300px; 
        }

        /* --- אור עוקב עכבר --- */
        #cursor-glow {
            position: fixed;
            top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* קונטיינר כפתורים */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 1;
        }

        .profile-pic {
            width: 130px; height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #334155;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .link-btn {
            display: block;
            background-color: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid rgba(51, 65, 85, 0.5);
            font-weight: bold;
            font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
