<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האחים רייט - עיתון</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #333;
        }

        /* החלק העליון (Header) */
        header {
            background-color: #fff;
            border-top: 5px solid #d80000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .logo {
            font-weight: 900;
            font-size: 24px;
            color: #d80000;
        }
        
        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
            font-weight: bold;
        }

        /* תיבת הכתבה המרכזית */
        .container {
            max-width: 850px;
            margin: 30px auto;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            padding: 30px; /* ריווח פנימי */
        }

        /* הקטגוריה מעל התמונה */
        .category-label {
            color: #d80000;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #d80000;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* עיצוב התמונה שהוקטנה */
        .article-image {
            width: 100%;
            height: 280px; /* עשיתי את התמונה הרבה יותר קצרה/נמוכה */
            object-fit: cover; /* מוודא שהתמונה חתוכה יפה ולא נמרחת */
            border-radius: 6px;
            margin-bottom: 25px;
            background-color: #e0e0e0;
        }
        
        h1 {
            font-size: 42px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #111;
            line-height: 1.1;
        }
        
        p.text-body {
            font-size: 20px;
            line-height: 1.7;
            margin-bottom: 50px;
            color: #444;
        }

        /* קרדיטים וכפתור */
        .footer-section {
            border-top: 2px solid #eaeaea;
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .credits { font-size: 16px; color: #666; }
        .credits strong { color: #222; }
        
        .share-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        
        @media (max-width: 600px) {
            .article-image { height: 200px; }
            h1 { font-size: 30px; }
            .footer-section { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ynet - היסטוריה</div>
        <div class="nav-links">
            <a href="#">ראשי</a>
            <a href="#">מדע ותעופה</a>
        </div>
    </header>

    <div class="container">
        <div class="category-label">כתבה - האחים רייט</div>
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Wright_Brothers_1903_flight.jpg" alt="האחים רייט" class="article-image">

        <h1>האחים רייט</h1>
        
        <p class="text-body" id="article-text">אין מידע כאן.</p>

        <div class="footer-section">
            <div class="credits">
                <strong>קרדיטים:</strong> עילאי, דניאל, אלעד, אור, גליה
            </div>
            <button class="share-btn" onclick="copyLink()">שתף את הכתבה 🔗</button>
        </div>
    </div>

    <script>
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('הקישור לאתר הועתק בהצלחה!');
            });
        }
    </script>

</body>
</html>
