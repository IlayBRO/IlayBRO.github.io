<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr - תיק עבודות</title>
    <style>
        /* יצירת אפקט הגלילה החלקה */
        html {
            scroll-behavior: smooth;
        }

        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: #1f272f;
            color: #ffffff;
            overflow-x: hidden; /* מונע גלילה אופקית בגלל אנימציות */
        }

        /* --- אנימציית חשיפה בגלילה (Fade In Up) --- */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- תפריט ניווט --- */
        .navbar {
            background-color: #4cd5de;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            background-color: rgba(31, 39, 47, 0.1);
        }

        /* --- אזור כניסה (Hero) --- */
        .hero-section {
            position: relative;
            background-image: url('https://i.postimg.cc/sQdZZFy5/hero-bg-jpg.png');
            background-size: cover;
            background-position: center;
            height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 50px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.6);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content .hero-underline {
            width: 80px;
            height: 4px;
            background-color: #4cd5de;
            margin: 0 auto 15px auto;
        }

        .hero-content h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* --- כותרות כלליות --- */
        .header-section {
            text-align: center;
            margin: 0 0 40px 0;
        }

        .header-section h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-section .underline {
            width: 40px;
            height: 3px;
            background-color: #4cd5de;
            margin: 0 auto;
        }

        /* --- גלריה --- */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            padding: 0 40px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .eye-circle {
            background-color: #4cd5de;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.5);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .eye-circle {
            transform: scale(1);
        }

        .eye-circle svg {
            width: 24px;
            height: 24px;
        }

        /* חלון קופץ לתמונות (Modal) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(15, 20, 25, 0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #4cd5de;
            font-size: 50px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
        }

        .close:hover, .close:focus { color: #ffffff; }

        .prev-btn, .next-btn {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            padding: 16px;
            color: #4cd5de;
            font-weight: bold;
            font-size: 40px;
            transition: 0.3s;
            user-select: none;
            z-index: 1001;
            border-radius: 5px;
        }

        .prev-btn { right: 20px; }
        .next-btn { left: 20px; }

        .prev-btn:hover, .next-btn:hover {
            color: #ffffff;
            background-color: rgba(0,0,0,0.5);
        }

        /* --- אזור קצת עליי --- */
        .about-section {
            padding: 60px 40px;
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
            background-color: #1f272f
