<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr - תיק עבודות</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: #1f272f;
            color: #ffffff;
        }

        .navbar {
            background-color: #4cd5de;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a.active {
            background-color: #1f272f;
            color: #4cd5de;
        }

        .nav-links a:hover {
            background-color: rgba(31, 39, 47, 0.1);
        }

        .hero-section {
            position: relative;
            background-image: url('https://i.imgur.com/ph8eV0V.jpeg');
            background-size: cover;
            background-position: center;
            height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 50px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.6);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content .hero-underline {
            width: 80px;
            height: 4px;
            background-color: #4cd5de;
            margin: 0 auto 15px auto;
        }

        .hero-content h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .header-section {
            text-align: center;
            margin: 0 0 40px 0;
        }

        .header-section h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-section .underline {
            width: 40px;
            height: 3px;
            background-color: #4cd5de;
            margin: 0 auto;
        }

        .gallery {
            column-count: 3;
            column-gap: 15px;
            padding: 0 40px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 50vh;
        }

        .gallery-item {
            position: relative;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }
