<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr | Official Links</title>
    <style>
        /* הגדרות בסיסיות */
        body {
            background-color: #0b1120; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 120px; /* מרווח למטה כדי שהנגנים לא יסתירו */
            overflow-x: hidden;
            position: relative;
        }

        /* --- אורות דקורטיביים בצדדים --- */
        .glow-orb {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }
        .orb-left { 
            background: radial-gradient(circle, #0dcaf0, transparent 70%); 
            bottom: -200px; 
            left: -300px; 
        }
        .orb-right { 
            background: radial-gradient(circle, #20c997, transparent 70%); 
            bottom: -200px; 
            right: -300px; 
        }

        /* --- אור לבן עדין שעוקב אחרי העכבר --- */
        #cursor-glow {
            position: fixed;
            top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* קונטיינר כפתורים */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 1;
        }

        .profile-pic {
            width: 130px; height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* --- הכפתורים עם אפקט הזכוכית (Glassmorphism) --- */
        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            font-weight: bold;
            font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-pink:hover { border-color: #ff1493; box-shadow: 0 0 20px #ff1493; color: #ff1493; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-spotify:hover { border-color: #1DB954; box-shadow: 0 0 20px #1DB954; color: #1DB954; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-red:hover { border-color: #ff0050; box-shadow: 0 0 20px #ff0050; color: #ff0050; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-green:hover { border-color: #53fc18; box-shadow: 0 0 20px #53fc18; color: #53fc18; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }

        .footer { 
            margin-top: 50px; text-align: center; color: #94a3b8; font-size: 14px; z-index: 1; 
        }
        .discord-tag { color: #5865F2; font-weight: bold; }

        /* --- נגן מוזיקה (צד ימין למטה) --- */
        .floating-music-container { 
            position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; 
        }
        .music-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 18px; width: 300px; margin-bottom: 15px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .music-panel.show { display: block; }
        
        .artist-btn { background-color: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .artist-btn:hover { background-color: rgba(255, 255, 255, 0.15); border-color: white; }

        .music-toggle-btn { 
            background: linear-gradient(45deg, #ff0050, #b000ff); color: white; border: none; padding: 16px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 0, 80, 0.4); transition: transform 0.2s;
        }
        .music-toggle-btn:hover { transform: scale(1.05); }

        /* --- כפתור שיתוף משולב מונה (צד שמאל למטה) - בדיוק לפי התמונה --- */
        .floating-share-container {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
        }

        .share-btn-glass {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
            overflow: hidden;
            padding: 0;
        }
        
        .share-btn-glass:hover { transform: scale(1.05); }

        /* האזור הכחול/טורקיז של המונה (צד שמאל) */
        .counter-section {
            background: linear-gradient(45deg, rgba(13, 202, 240, 0.1), rgba(88, 101, 242, 0.1));
            color: #0dcaf0;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* התג של המונה שמושך את המספר האמיתי מיוטיוב/גיטהאב */
        .views-badge {
            filter: drop-shadow(0 0 5px rgba(13, 202, 240, 0.7));
            height: 18px;
            vertical-align: middle;
        }

        /* האזור הוורוד/אדום של הטקסט (צד ימין) */
        .text-section {
            color: #ff1493;
            padding: 16px 25px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* עיצוב לכפתור כשהוא במצב "הועתק" */
        .share-btn-glass.copied .text-section {
            color: #20c997;
        }
        .share-btn-glass.copied .counter-section {
            color: #20c997;
            background: linear-gradient(45deg, rgba(32, 201, 151, 0.1), rgba(29, 185, 84, 0.1));
        }
    </style>
</head>
<body>

    <div class="glow-orb orb-left"></div>
    <div class="glow-orb orb-right"></div>
    <div id="cursor-glow"></div>

    <div class="container">
        <img src="https://cdn.discordapp.com/avatars/1184520166059540563/794631dae2d89e31e1d4120cce221f30.png?size=512" class="profile-pic">
        <h2 style="margin-bottom: 5px;">Potteerr</h2>
        <p style="color: #94a3b8; margin-bottom: 35px;">הקישורים הרשמיים שלי</p>

        <a href="songs" class="link-btn neon-pink">השירים שאהבתי 💖</a>
        <a href="https://open.spotify.com/playlist/6rhTWIqKgjJhP6cCEYd2G2?si=1ca29203b74443d2" class="link-btn neon-spotify" target="_blank">הפלייליסטים שלי בספוטיפיי 🎧</a>
        <a href="https://www.youtube.com/@Ilay-Potteerr" class="link-btn neon-red" target="_blank">YouTube - הערוץ הרשמי 📺</a>
        <a href="https://kick.com/ilay2342" class="link-btn neon-green" target="_blank">Kick - לייבים 🟩</a>
    </div>

    <div class="footer">
        <p>אם אתה צריך עוד עזרה, פנה אל <span class="discord-tag">_potteerr</span> בדיסקורד</p>
        <p>© 2026 Potteerr . כל הזכויות שמורות.</p>
    </div>

    <div class="floating-music-container">
        <div class="music-panel" id="musicPanel">
            <h3 style="margin-top:0; text-align: center;">🎵 נגן מוזיקה</h3>
            <iframe id="yt-player" width="100%" height="160" src="https://www.youtube.com/embed/videoseries?list=PLojCWQm27CqgXW7r_j6yV-addX4hR_ARF" frameborder="0" allow="autoplay; encrypted-media" style="border-radius:12px"></iframe>
            <div style="margin-top:15px; display:flex; flex-wrap:wrap; justify-content:center; gap:8px">
                <button class="artist-btn" onclick="changePlaylist('PLojCWQm27CqgXW7r_j6yV-addX4hR_ARF')">עומר אדם</button>
                <button class="artist-btn" onclick="changePlaylist('PLBuClMIvTbnKjfAWSbHXNiBkEmKo6dQrn')">אושר כהן</button>
                <button class="artist-btn" onclick="changePlaylist('PLRoAcjYkU72CK-54sA6hgYPvj1zUVCvuV')">פאר טסי</button>
            </div>
        </div>
        <button class="music-toggle-btn" onclick="toggleMusic()">מוזיקה 🎵</button>
    </div>

    <div class="floating-share-container">
        <button class="share-btn-glass" id="combinedBtn" onclick="copyMyLink()">
            <div class="counter-section">
                <img src="https://komarev.com/ghpvc/?username=ilaybro-official-site&label=Views&color=0dcaf0&style=flat-square&labelColor=0b1120" alt="Views" class="views-badge">
            </div>
            <div class="text-section" id="shareText">
                🔗 שתף את האתר
            </div>
        </button>
    </div>

    <script>
        // עוקב עכבר
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        function toggleMusic() { document.getElementById("musicPanel").classList.toggle("show"); }
        function changePlaylist(id) { document.getElementById("yt-player").src = "https://www.youtube.com/embed/videoseries?list=" + id + "&autoplay=1"; }

        function copyMyLink() {
            const siteUrl = window.location.href.split('?')[0].replace('index.html', '');
            navigator.clipboard.writeText(siteUrl).then(() => {
                const btn = document.getElementById("combinedBtn");
                const textSection = document.getElementById("shareText");
                
                textSection.innerHTML = "✅ הועתק!";
                btn.classList.add("copied");
                
                setTimeout(() => {
                    textSection.innerHTML = "🔗 שתף את האתר";
                    btn.classList.remove("copied");
                }, 2000);
            });
        }
    </script>
</body>
</html>
