<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr - תיק עבודות</title>
    <style>
        /* ייבוא פונט בעברית מגוגל */
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: #1f272f;
            color: #ffffff;
        }

        .navbar {
            background-color: #4cd5de;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a.active {
            background-color: #1f272f;
            color: #4cd5de;
        }

        .nav-links a:hover {
            background-color: rgba(31, 39, 47, 0.1);
        }

        .header-section {
            text-align: center;
            margin: 50px 0 40px 0;
        }

        .header-section h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-section .underline {
            width: 40px;
            height: 3px;
            background-color: #4cd5de;
            margin: 0 auto;
        }

        /* עדכון הגלריה כדי שתתמוך באפקט העין */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            padding: 0 40px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03); /* הגדלה עדינה של התמונה עצמה */
        }

        /* האזור הכהה שעולה על התמונה במעבר עכבר */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* העין הכחולה */
        .eye-circle {
            background-color: #4cd5de;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.5);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .eye-circle {
            transform: scale(1); /* אפקט קפיצה לעין */
        }

        .eye-circle svg {
            width: 24px;
            height: 24px;
        }

        /* עיצוב החלון הקופץ (Modal) של התמונה הגדולה */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 20, 25, 0.9); /* רקע כהה כמעט אטום */
            backdrop-filter: blur(5px);
        }

            margin: auto;
            display: block
