<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האחים רייט - עיתון</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #333;
        }

        header {
            background-color: #fff;
            border-top: 5px solid #d80000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .logo {
            font-weight: 900;
            font-size: 24px;
            color: #d80000;
        }
        
        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #d80000;
        }

        .container {
            max-width: 850px;
            margin: 30px auto;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 450px;
            /* כאן הכנסתי את השם המדויק של התמונה ששלחת */
            background-image: url('17759735954816421675426189848689.jpg'); 
            background-size: cover;
            background-position: center;
            background-color: #d1d1d1; /* צבע גיבוי אפור למקרה שהתמונה מתעכבת */
        }
        
        .hero-text {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(216, 0, 0, 0.85); 
            color: white;
            padding: 8px 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .content {
            padding: 40px;
        }
        
        h1 {
            font-size: 46px;
            margin-top: 0;
            margin-bottom: 25px;
            color: #111;
            line-height: 1.1;
        }
        
        p.text-body {
            font-size: 20px;
            line-height: 1.7;
            margin-bottom: 50px;
            color: #444;
        }

        .footer-section {
            border-top: 2px solid #eaeaea;
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .credits {
            font-size: 16px;
            color: #666;
        }
        
        .credits strong {
            color: #222;
        }
        
        .share-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        
        .share-btn:hover {
            background-color: #1557b0;
        }
        
        .share-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 600px) {
            .hero { height: 250px; }
            h1 { font-size: 32px; }
            .footer-section { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ynet - היסטוריה</div>
        <div class="nav-links">
            <a href="#">ראשי</a>
            <a href="#">מדע ותעופה</a>
            <a href="#">מגזין</a>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <div class="hero-text">כתבה-האחים רייט</div>
        </div>

        <div class="content">
            <h1>האחים רייט</h1>
            
            <p class="text-body" id="article-text">אין מידע כאן.</p>

            <div class="footer-section">
                <div class="credits">
                    <strong>קרדיטים:</strong> עילאי, דניאל, אלעד, אור, גליה
                </div>
                <button class="share-btn" onclick="copyLink()">שתף את הכתבה 🔗</button>
            </div>
        </div>
    </div>

    <script>
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('הקישור לאתר הועתק בהצלחה!');
            }).catch(err => {
                alert('הייתה בעיה בהעתקת הקישור: ' + err);
            });
        }
    </script>

</body>
</html>
