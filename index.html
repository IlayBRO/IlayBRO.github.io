<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr</title>
    <style>
        /* עיצוב הרקע והגוף */
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
            padding-bottom: 100px; /* הוספתי עוד קצת מרווח למטה כדי שהנגן לא יסתיר את הפוטר */
        }

        /* הקופסה הראשית שמכילה את הקישורים */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 1;
            margin-bottom: 50px;
        }

        /* עיצוב תמונת הפרופיל */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #334155;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* עיצוב בסיסי לכפתורים */
        .link-btn {
            display: block;
            background-color: #1e293b;
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
