<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr - תיק עבודות</title>
    <style>
        /* ייבוא פונט בעברית מגוגל */
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: #1f272f;
            color: #ffffff;
        }

        .navbar {
            background-color: #4cd5de;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a.active {
            background-color: #1f272f;
            color: #4cd5de;
        }

        .nav-links a:hover {
            background-color: rgba(31, 39, 47, 0.1);
        }

        .header-section {
            text-align: center;
            margin: 50px 0 40px 0;
        }

        .header-section h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-section .underline {
            width: 40px;
            height: 3px;
            background-color: #4cd5de;
            margin: 0 auto;
        }

        /* עדכון הגלריה כדי שתתמוך באפקט העין */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            padding: 0 40px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03); /* הגדלה עדינה של התמונה עצמה */
        }

        /* האזור הכהה שעולה על התמונה במעבר עכבר */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* העין הכחולה */
        .eye-circle {
            background-color: #4cd5de;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.5);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .eye-circle {
            transform: scale(1); /* אפקט קפיצה לעין */
        }

        .eye-circle svg {
            width: 24px;
            height: 24px;
        }

        /* עיצוב החלון הקופץ (Modal) של התמונה הגדולה */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 20, 25, 0.9); /* רקע כהה כמעט אטום */
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* כפתור הסגירה (X) */
        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #4cd5de;
            font-size: 50px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #ffffff;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            .gallery { column-count: 2; }
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
        }

        @media (max-width: 600px) {
            .gallery { column-count: 1; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Potteerr תיק עבודות</div>
        <ul class="nav-links">
            <li><a href="#">בית</a></li>
            <li><a href="#" class="active">עיצוב גרפי כללי</a></li>
            <li><a href="#">טקסטורות לפייבאם</a></li>
            <li><a href="#">גיפים</a></li>
            <li><a href="#">יוצרי תוכן שעבדתי איתם</a></li>
            <li><a href="#">יצירת קשר</a></li>
        </ul>
    </nav>

    <div class="header-section">
        <h1>עיצוב גרפי כללי</h1>
        <div class="underline"></div>
    </div>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://i.imgur.com/9YDxGBl.jpeg" alt="עבודה 1">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/disbjfs.jpeg" alt="עבודה 2">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/ph8ncOJ.jpeg" alt="עבודה 3">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/Cd3MI5g.jpeg" alt="עבודה 4">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/VqOwD1F.png" alt="עבודה 5">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/Dn5vORO.png" alt="עבודה 6">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
        <div class="gallery-item">
            <img src="https://i.imgur.com/uCWSg4b.png" alt="עבודה 7">
            <div class="overlay">
                <div class="eye-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <script>
        // תפיסת האלמנטים הרלוונטיים
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("expandedImg");
        const galleryItems = document.querySelectorAll(".gallery-item");
        const span = document.getElementsByClassName("close")[0];

        // מעבר על כל התמונות והוספת מאזין ללחיצה
        galleryItems.forEach(item => {
            item.addEventListener("click", function() {
                modal.style.display = "block"; // מציג את החלון
                modalImg.src = this.querySelector("img").src; // לוקח את הקישור מהתמונה שלחצנו עליה
            });
        });

        // סגירה בעת לחיצה על ה-X
        span.onclick = function() {
            modal.style.display = "none";
        }

        // סגירה בעת לחיצה על הרקע השחור מסביב לתמונה
        modal.onclick = function(event) {
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
