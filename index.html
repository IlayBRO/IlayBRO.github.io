<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr - תיק עבודות</title>
    <style>
        /* יצירת אפקט הגלילה החלקה כשלוחצים על קישור בתפריט */
        html {
            scroll-behavior: smooth;
        }

        /* ייבוא פונט בעברית מגוגל */
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap');

        body {
            margin: 0;
            font-family: 'Assistant', sans-serif;
            background-color: #1f272f;
            color: #ffffff;
        }

        .navbar {
            background-color: #4cd5de;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a.active {
            background-color: #1f272f;
            color: #4cd5de;
        }

        .nav-links a:hover {
            background-color: rgba(31, 39, 47, 0.1);
        }

        /* --- אזור כניסה לאתר (Hero Section) החדש --- */
        .hero-section {
            position: relative;
            background-image: url('https://i.imgur.com/ph8eV0V.jpeg'); /* התמונה מהקישור שלך */
            background-size: cover;
            background-position: center;
            height: 55vh; /* גובה האזור (55% מגובה המסך) */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 50px;
        }

        /* שכבה כהה מעל התמונה כדי שהטקסט יבלוט */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.6);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-content .hero-underline {
            width: 80px;
            height: 4px;
            background-color: #4cd5de;
            margin: 0 auto 15px auto;
        }

        .hero-content h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* --- כותרות רגילות --- */
        .header-section {
            text-align: center;
            margin: 0 0 40px 0;
        }

        .header-section h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-section .underline {
            width: 40px;
            height: 3px;
            background-color: #4cd5de;
            margin: 0 auto;
        }

        /* גלריה */
        .gallery {
            column-count: 3;
            column-gap: 15px;
            padding: 0 40px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 50vh;
        }

        .gallery-item {
            position: relative;
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(31, 39, 47, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .eye-circle {
            background-color: #4cd5de;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.5);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .eye-circle {
            transform: scale(1);
        }

        .eye-circle svg {
            width: 24px;
            height: 24px;
        }

        /* חלון קופץ לתמונה */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 20, 25, 0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #4cd5de;
            font-size: 50px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close:hover, .close:focus {
            color: #ffffff;
            text-decoration: none;
        }

        /* --- אזור יצירת קשר --- */
        .contact-section {
            padding: 60px 0;
            text-align: center;
        }

        .discord-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .discord-circle {
            background-color: #5865F2;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .discord-circle svg {
            width: 80px;
            height: 80px;
            fill: #ffffff;
        }

        .discord-wrapper h3 {
            font-size: 1.6rem;
            margin: 0;
            font-weight: 800;
        }

        .discord-underline {
            width: 50px;
            height: 3px;
            background-color: #4cd5de;
            margin: 15px 0;
        }

        .discord-wrapper p {
            font-size: 1.2rem;
            margin: 0;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* --- פוטר תחתון --- */
        .site-footer {
            background-color: #4cd5de;
            color: #000000;
            padding: 25px 20px 15px 20px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

        .site-footer p {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .gallery { column-count: 2; }
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            .hero-content h1 { font-size: 3rem; }
        }

        @media (max-width: 600px) {
            .gallery { column-count: 1; }
            .hero-content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
