<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potteerr</title>
    <style>
        /* עיצוב הרקע והגוף */
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 50px;
        }

        /* הקופסה שמכילה את הכל וממרכזת את התוכן */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 1;
        }

        /* עיצוב תמונת הפרופיל */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #334155;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* עיצוב בסיסי לכפתורים */
        .link-btn {
            display: block;
            background-color: #1e293b;
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* --- אפקטים של ניאון במעבר עכבר (Hover) --- */
        .neon-red:hover { border-color: #ff0050; box-shadow: 0 0 15px #ff0050, 0 0 30px #ff0050; color: #ff0050; background-color: #1e293b; }
        .neon-green:hover { border-color: #53fc18; box-shadow: 0 0 15px #53fc18, 0 0 30px #53fc18; color: #53fc18; }
        .neon-pink:hover { border-color: #ff1493; box-shadow: 0 0 15px #ff1493, 0 0 30px #ff1493; color: #ff1493; }
        .neon-spotify:hover { border-color: #1DB954; box-shadow: 0 0 15px #1DB954, 0 0 30px #1DB954; color: #1DB954; }

        /* --- עיצוב נגן המוזיקה הצף מצד ימין למטה --- */
        .floating-music-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .music-panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            width: 280px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: none;
            text-align: center;
        }

        .music-panel.show {
            display: block;
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .music-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #e2e8f0;
        }

        .artist-btn {
            background-color: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .artist-btn:hover {
            background-color: #334155;
            border-color: #e2e8f0;
        }

        .music-toggle-btn {
            background: linear-gradient(45deg, #ff0050, #b000ff);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .music-toggle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(176, 0, 255, 0.8);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cdn.discordapp.com/avatars/1184520166059540563/794631dae2d89e31e1d4120cce221f30.png?size=512" alt="לוגו" class="profile-pic">

    <h2>הקישורים הרשמיים</h2>
    <p style="color: #94a3b8; margin-bottom: 30px;">ברוכים הבאים לעמוד שלי!</p>

    <a href="#" class="link-btn neon-pink">השירים שאהבתי 💖</a>
    <a href="https://spotify.com" class="link-btn neon-spotify">הפלייליסטים שלי בספוטיפיי 🎧</a>
    <a href="https://www.youtube.com/@Ilay-Potteerr" class="link-btn neon-red">YouTube - הערוץ הרשמי 📺</a>
    <a href="https://kick.com/ilay2342" class="link-btn neon-green">Kick - לייבים 🟩</a>
</div>

<div class="floating-music-container">
    
    <div class="music-panel" id="musicPanel">
        <h3>🎵 הלהיטים החמים</h3>
        
        <iframe id="yt-player" width="100%" height="150" src="https://www.youtube.com/embed/videoseries?list=PLojCWQm27CqgXW7r_j6yV-addX4hR_ARF" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius: 10px; margin-bottom: 10px;"></iframe>
        
        <div>
            <button class="artist-btn" onclick="changePlaylist('PLojCWQm27CqgXW7r_j6yV-addX4hR_ARF')">עומר אדם</button>
            <button class="artist-btn" onclick="changePlaylist('PLBuClMIvTbnKjfAWSbHXNiBkEmKo6dQrn')">אושר כהן</button>
            <button class="artist-btn" onclick="changePlaylist('PLRoAcjYkU72CK-54sA6hgYPvj1zUVCvuV')">פאר טסי</button>
        </div>
    </div>

    <button class="music-toggle-btn" onclick="toggleMusic()">מוזיקה 🎵</button>

</div>

<script>
    // פונקציה לפתיחה וסגירה של חלונית המוזיקה
    function toggleMusic() {
        var panel = document.getElementById("musicPanel");
        panel.classList.toggle("show");
    }

    // פונקציה שמחליפה את הפלייליסט בנגן
    function changePlaylist(playlistId) {
        var iframe = document.getElementById("yt-player");
        // הפקודה videoseries אומרת ליוטיוב לנגן רשימת השמעה שלמה
        iframe.src = "https://www.youtube.com/embed/videoseries?list=" + playlistId + "&autoplay=1";
    }
</script>

</body>
</html>
