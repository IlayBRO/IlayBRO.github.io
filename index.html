    <style>
        /* הגדרות בסיסיות */
        body {
            background-color: #0b1120; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- אורות דקורטיביים בצדדים --- */
        .glow-orb {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }
        .orb-left { 
            background: radial-gradient(circle, #0dcaf0, transparent 70%); 
            bottom: -200px; 
            left: -300px; 
        }
        .orb-right { 
            background: radial-gradient(circle, #20c997, transparent 70%); 
            bottom: -200px; 
            right: -300px; 
        }

        /* --- אור עוקב עכבר --- */
        #cursor-glow {
            position: fixed;
            top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* קונטיינר כפתורים */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 1;
        }

        .profile-pic {
            width: 130px; height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2); /* התאמתי קצת גם את התמונה לזכוכית */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* --- הכפתורים עם אפקט הזכוכית (Glassmorphism) --- */
        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05); /* רקע כמעט שקוף לגמרי */
            backdrop-filter: blur(15px); /* טשטוש חזק במיוחד מאחורי הכפתור */
            -webkit-backdrop-filter: blur(15px); /* תמיכה למכשירי אפל */
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* מסגרת זכוכית עדינה */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* צל נמוך לעומק */
            font-weight: bold;
            font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neon-pink:hover { border-color: #ff1493; box-shadow: 0 0 20px #ff1493; color: #ff1493; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-spotify:hover { border-color: #1DB954; box-shadow: 0 0 20px #1DB954; color: #1DB954; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-red:hover { border-color: #ff0050; box-shadow: 0 0 20px #ff0050; color: #ff0050; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }
        .neon-green:hover { border-color: #53fc18; box-shadow: 0 0 20px #53fc18; color: #53fc18; transform: scale(1.02); background: rgba(30, 41, 59, 0.8); }

        .footer { 
            margin-top: 50px; text-align: center; color: #94a3b8; font-size: 14px; z-index: 1; 
        }
        .discord-tag { color: #5865F2; font-weight: bold; }

            position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; 
        }
        .music-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 18px; width: 300px; margin-bottom: 15px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .music-panel.show { display: block; }

        .artist-btn:hover { background-color: rgba(255, 255, 255, 0.15); border-color: white; }
